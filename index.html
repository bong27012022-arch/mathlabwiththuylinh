<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Linh's Mathlab - Học toán cùng cô Thùy Linh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Noto+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Lexend', 'sans-serif'],
            body: ['Noto Sans', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#0d9488', // Teal 600
              light: '#2dd4bf',   // Teal 400
              dark: '#0f766e',    // Teal 700
              surface: '#f0fdfa', // Teal 50
            },
            accent: {
              yellow: '#facc15',
              orange: '#fb923c',
              purple: '#a855f7',
            },
            dark: {
              bg: '#111827',
              surface: '#1f2937',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'blob': 'blob 7s infinite',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'scale-up': 'scaleUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
            'slide-up': 'slideUp 0.35s ease-out forwards',
            'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            scaleUp: {
              '0%': { opacity: '0', transform: 'scale(0.9)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          }
        },
      },
    }
  </script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }

    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      width: 5px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 9999px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: #d1d5db transparent;
    }

    /* Safe Area Padding for iPhone notch */
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* Math Formatting */
    .math-formula {
      font-family: 'Times New Roman', serif;
      font-weight: 500;
    }

    /* Fraction Styling */
    .fraction {
      display: inline-flex;
      flex-direction: column;
      vertical-align: middle;
      text-align: center;
      line-height: 1;
      padding: 0 2px;
    }

    .fraction .num {
      border-bottom: 1px solid currentColor;
      padding-bottom: 1px;
      font-size: 0.9em;
    }

    .fraction .den {
      padding-top: 1px;
      font-size: 0.9em;
    }

    /* Square Root Styling */
    .under-root {
      border-top: 1px solid currentColor;
      display: inline-block;
      padding-top: 1px;
      margin-left: -2px;
    }
    sup {
      font-size: 0.75em;
      vertical-align: super;
      line-height: 0;
    }

    sub {
      font-size: 0.75em;
      vertical-align: sub;
      line-height: 0;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "vite": "https://esm.sh/vite@^7.3.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
